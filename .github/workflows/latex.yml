name: Build LaTeX templates

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  engineering-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install TeX Live packages
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-xetex texlive-lang-chinese texlive-latex-extra texlive-science
      - name: Compile template
        working-directory: templates/engineering-report
        run: make
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: engineering-report-pdf
          path: templates/engineering-report/main.pdf
